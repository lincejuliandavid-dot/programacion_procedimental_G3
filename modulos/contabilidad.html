<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Contable</title>
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        :root {
         
            --brand-primary: #0052FF; 
            --brand-success: #00D1FF; 
            --bg-body: #F8FAFC;
            --white: #ffffff;
            --text-dark: #0F172A;
            --text-light: #64748B;
            --border-color: #E2E8F0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 82, 255, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 209, 255, 0.05) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
        }

        .contenedor {
            width: 900px;
            background: var(--white);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        .titulo {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 35px;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            letter-spacing: -0.5px;
        }

        .titulo span {
            color: var(--brand-primary);
            margin-right: 8px;
        }

        .panel {
            display: flex;
            gap: 40px;
        }

       
        .perfil {
            width: 250px;
            text-align: center;
        }

        .foto-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
        }

        .foto {
            width: 100%;
            height: 100%;
            border-radius: 30px; 
            background: #F1F5F9;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid var(--border-color);
        }

        .foto img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cliente {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .estado {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #ECFDF5;
            color: #059669;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
        }

        .estado::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #10B981;
            border-radius: 50%;
        }

        .formulario {
            flex: 1;
        }

        .fila {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .campo {
            flex: 1;
        }

        .campo label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .campo input {
            width: 100%;
            background: #F8FAFC;
            border: 1.5px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-dark);
            transition: all 0.2s ease;
        }

        .campo input:focus {
            outline: none;
            border-color: var(--brand-primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(0, 82, 255, 0.1);
        }

        .boton-container {
            margin-top: 15px;
        }

        .btn-registrar {
            width: 100%;
            background: var(--text-dark); 
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-registrar:hover {
            background: var(--brand-primary);
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -10px rgba(37, 15, 15, 0.5);
        }

    </style>
</head>

<body>

    <div class="container">
        <div class="titulo">
            <span>●</span> Gestión de Contabilidad
        </div>

        <div class="panel">
          
            <div class="perfil">
                <div class="foto-wrapper">
                    <div class="foto">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTF15oWo_UZbhvIMf3t6uivCk74Y_Dm5NhQMw&s" alt="Usuario">
                    </div>
                </div>
                <div class="cliente">casper_YT</div>
                <div class="estado">Cuenta Activa</div>
            </div>

         
            <div class="formulario">
                <div class="fila">
                    <div class="campo">
                        <label>Ventas Semanales</label>
                        <input type="text" placeholder="0.00">
                    </div>
                    <div class="campo">
                        <label>Fecha de Corte</label>
                        <input type="date" id="fecha_de_corte">
                    </div>
                </div>

                <div class="fila">
                    <div class="campo">
                        <label>Ingresos</label>
                        <input type="text" id ="campo"  placeholder="Entrada de capital">
                    </div>
                    <div class="campo">
                        <label>Egresos</label>
                        <input type="text" id= "egresos" placeholder="Gastos y costos">
                    </div>
                </div>
                
                

                <div class="fila">
                    <div class="campo">
                        <label>Concepto</label>
                        <input type="text" id ="concepto" placeholder="Descripción de la transacción">
                    </div>
                    <div class="campo">
                        <label>Valor Total</label>
                        <input type="number" id ="valor_total" placeholder="Monto">
                    </div>
                </div>

                <div class="boton-container">
                    <button class="btn-registrar">Registrar Movimiento</button>
                </div>
            </div>
        </div>
    </div>
<script src="../js/contabilidad.js"></script>
</body>
</html>
